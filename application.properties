# =====================================================
# TP03 - Bestioles (Spring Data JPA & Repositories)
# Configuration DataSource et JPA/Hibernate
# =====================================================

# Application name
spring.application.name=Spring-TP03-Bestioles

# =====================================================
# DATASOURCE CONFIGURATION
# =====================================================

# Connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/bestioles

# Database username and password
spring.datasource.username=root
spring.datasource.password=root

# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# JPA / HIBERNATE CONFIGURATION
# =====================================================

# DDL Auto Strategy
# Valeurs possibles:
#   - create          : Crée les tables (les supprime si elles existent)
#   - create-drop     : Crée les tables et les supprime à l'arrêt
#   - update          : Modifie les tables si nécessaire
#   - validate        : Valide la structure (NE MODIFIE PAS la BDD) ⭐ À UTILISER POUR CE TP
#   - none            : Aucune action
spring.jpa.hibernate.ddl-auto=validate

# Display SQL queries in console
spring.jpa.show-sql=true

# Format SQL queries (pour lisibilité)
spring.jpa.properties.hibernate.format_sql=true

# Database Platform (pour Hibernate)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =====================================================
# LOGGING CONFIGURATION
# =====================================================

# Root logging level
logging.level.root=INFO

# Application logging level
logging.level.com.example.demo=DEBUG

# Hibernate logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =====================================================
# SERVER CONFIGURATION
# =====================================================

# Server port
server.port=8080

# Context path (optionnel)
# server.servlet.context-path=/api

# =====================================================
# NOTES:
# =====================================================
# 1. ddl-auto=validate : Ne modifie PAS la BDD
#    → Parfait pour travailler avec une BDD existante
#
# 2. show-sql=true : Affiche toutes les requêtes SQL
#    → Utile pour déboguer et apprendre
#
# 3. Modifier les credentials (username/password)
#    selon votre configuration locale
#
# 4. Le port 8080 est le port par défaut
#    → Le changer si déjà utilisé
# =====================================================
